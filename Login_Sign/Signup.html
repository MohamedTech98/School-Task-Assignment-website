<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">

</head>

<body>
   
    <nav>
    <a href="index.html" class="brand">
        <div class="logo-icon">📋</div>
        <span>EduTask</span>
    </a>

   
    </nav>
<div class="signup-container">

  <!-- LEFT -->
  <div class="signup-left">
    <h1>Join EduTask today.</h1>
    <p>Create your account and start managing tasks efficiently.</p>

    <ul>
      <li>• Instant access after sign-up</li>
      <li>• Role-based dashboard tailored for you</li>
      <li>• Priority-driven task management</li>
      <li>• Track progress and completions</li>
    </ul>
  </div>

  <!-- RIGHT -->
  <div class="signup-right">
    <div class="signup-box">

      <h2>Create Account</h2>
      <p>Already have an account? <a href="Login.html">Log in</a></p>

     <form onsubmit="signup(event)">

        <label>I AM A</label>
      <div class="role-toggle">
  <button type="button" class="active">🧑‍🏫 Teacher</button>
  <button type="button">👤 Admin</button>
</div>

        <div class="row">
          <div>

            <label>FIRST NAME</label>
         <input type="text" id="firstname" >
         <div class="error"></div>

          </div>


          <div>
            <label>LAST NAME</label>
            <input type="text" id="lastname" >
            <div class="error"></div>

          </div>

        </div>

        <label>USERNAME</label>
      <input type="text" id="username" >
      <div class="error"></div>

        <label>EMAIL ADDRESS</label>
        <input type="email" id="email" >
        <div class="error"></div>
        <label>PASSWORD</label>
        <input type="password" id="password" >
        <div class="error"></div>

        <label>CONFIRM PASSWORD</label>
        
     <input type="password" id="confirmPassword" >
     <div class="error"></div>

        <div class="divider"></div>

        <button class="submit-btn">Create Account →</button>

      </form>

    </div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
