<html>
    <head>
        <title>Edit Tasks</title>
        <meta charset="utf-8">
    </head>
    <body>
        <nav>
            <a href="Dashboard.html">Dashboard</a>
            <a href="craete_task.html">Create Task</a>
            <a href="edit_task.html">Edit Task</a>
            <a href="all_task.html">All Tasks</a>
        </nav>
        <form>
            <table>
                <tbody>
                    <tr>
                        <td><label for="ID">Task ID</label></td>
                        <td><input type="number" id="ID" name="ID" value="1"/></td>
                    </tr>
                    <tr>
                        <td><label for="name">Task Name</label></td>
                        <td><input type="text" id="name" name="task name" value="TAN"/></td>
                    </tr>
                    <tr>
                        <td><label for="teacher name">Teacher Name</label></td>
                        <td><input type="text" id="teacher name" name="teacher name" value="TN"></td>
                    </tr>
                    <tr>
                        <td>
                            <select name="Difficulity" id="difficulity">
                                <option value="h" id="high">High</option>
                                <option value="m" id="medium">Medium</option>
                                <option value="e" id="easy">Easy</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="description">Description</label></td>
                        <td><input type="text" id="description" name="des" value="Edit here"/></td>
                    </tr>
                    <tr>
                        <td><button type="submit">Edit</button></td>
                        <td><button type="reset">Reset</button></td>
                    </tr>
                </tbody>
            </table>
        </form>
    </body>
</html>
