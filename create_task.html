<html>
    <head>
        <title>Create Tasks</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="light">
        <nav >
            <a href="Dashboard.html" class="brand">
                <div class="logo-icon">📋</div>
                <span>EduTask</span>
            </a>
            <ui class="nav-links">
                <li><a href="create_task.html">Create Task</a> </li>   
                <li><a href="all_task.html">All Tasks</a> </li>  
                <li><a href="index.html" style="color: red;">Logout</a></li>
            </ui>        
        </nav >     
        <form>
            <table>
                <tbody>
                    <tr>
                        <td><label for="ID">Task ID</label></td>
                        <td><input type="number" id="ID" name="ID"/></td>
                    </tr>
                    <tr>
                        <td><label for="name">Task Name</label></td>
                        <td><input type="text" id="name" name="task name"/></td>
                    </tr>
                    <tr>
                        <td><label for="teacher name">Teacher Name</label></td>
                        <td><input type="text" id="teacher name" name="teacher name"></td>
                    </tr>
                    <tr>
                        <td>
                            <select name="Difficulity" id="difficulity">
                                <option value="h" id="high">High</option>
                                <option value="m" id="medium">Medium</option>
                                <option value="e" id="easy">Easy</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="description">Description</label></td>
                        <td><input type="text" id="description" name="des"/></td>
                    </tr>
                    <tr>
                        <td><button type="submit">Add Task</button></td>
                        <td><button type="reset">Reset</button></td>
                    </tr>
                </tbody>
            </table>
        </form>
        
    </body>
</html>
